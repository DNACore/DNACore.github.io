<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 表格编辑器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header-content {
            padding: 20px 20px 0 20px;
            background-color: #f4f7f6;
            flex-shrink: 0;
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button,
        input[type="file"] {
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
            font-size: 14px;
        }

        button {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }

        button:hover {
            background-color: #2980b9;
        }

        #saveButton {
            background-color: #2ecc71;
            border-color: #2ecc71;
        }

        #saveButton:hover {
            background-color: #27ae60;
        }

        #saveButton:disabled {
            background-color: #bdc3c7;
            border-color: #bdc3c7;
            cursor: not-allowed;
        }

        .table-container {
            flex-grow: 1;
            overflow-y: auto;
            margin: 0 20px 20px 20px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            /* --- 核心改动 1: 固定表格布局算法 --- */
            table-layout: fixed;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
            /* --- 核心改动 2: 允许内容换行和断词 --- */
            word-break: break-all;
        }

        thead th {
            position: sticky;
            top: 0;
            background-color: #ecf0f1;
            z-index: 10;
            cursor: pointer;
        }

        th:hover {
            background-color: #bdc3c7;
        }

        /* --- 核心改动 3: 为特定列设置宽度 --- */
        /* 短内容列，给一个较小的宽度 */
        .col-include,
        .col-type,
        .col-active {
            width: 12%;
        }

        /* title 和 pattern 平分剩余主要空间，实现 1:1 */
        .col-title,
        .col-pattern {
            width: 32%;
            /* (100 - 12*3) / 2 = 32 */
        }

        /* 排序箭头样式 */
        th .sort-indicator::after {
            content: '';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: 5px solid transparent;
        }

        th.sorted-asc .sort-indicator::after {
            border-bottom-color: #333;
        }

        th.sorted-desc .sort-indicator::after {
            border-top-color: #333;
        }
    </style>
</head>

<body>

    <div class="header-content">
        <h1>JSON 表格查看与排序工具</h1>
        <div class="controls">
            <input type="file" id="fileInput" accept=".json">
            <button id="saveButton" disabled>保存为 JSON 文件</button>
        </div>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr id="tableHeader"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let tableData = [];
        let currentSort = { column: null, direction: 'asc' };

        const fileInput = document.getElementById('fileInput');
        const saveButton = document.getElementById('saveButton');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const jsonContent = JSON.parse(e.target.result);
                    if (Array.isArray(jsonContent)) {
                        tableData = jsonContent;
                        currentSort = { column: null, direction: 'asc' };
                        renderTable();
                        saveButton.disabled = false;
                    } else {
                        alert('JSON 文件根结构必须是一个数组！');
                    }
                } catch (error) {
                    alert('文件不是有效的 JSON 格式: ' + error.message);
                }
            };
            reader.readAsText(file);
        });

        function renderTable() {
            if (tableData.length === 0) {
                const headers = ['include', 'type', 'title', 'pattern', 'active'];
                // --- 核心改动 4: 渲染表头时添加 class ---
                tableHeader.innerHTML = headers.map(header =>
                    `<th class="col-${header}" data-column="${header}">${header}<span class="sort-indicator"></span></th>`
                ).join('');
                tableBody.innerHTML = `<tr><td colspan="${headers.length}" style="text-align: center;">请先加载 JSON 文件。</td></tr>`;
                saveButton.
                    saveButton.disabled = true;
                return;
            }

            // 当有数据时...
            const headers = Object.keys(tableData[0]);

            // --- 核心改动 4 (续): 渲染表头时添加 class ---
            tableHeader.innerHTML = headers.map(header => `
                <th class="col-${header}" data-column="${header}">${header}<span class="sort-indicator"></span></th>
            `).join('');

            updateSortIndicator();

            // --- 核心改动 5: 渲染表格内容时，也为 <td> 添加 class ---
            tableBody.innerHTML = tableData.map(row => `
                <tr>
                    ${headers.map(header => `<td class="col-${header}">${row[header]}</td>`).join('')}
                </tr>
            `).join('');
        }

        // 3. 处理排序
        tableHeader.addEventListener('click', (event) => {
            const th = event.target.closest('th');
            // 如果表格没有数据，则不执行排序
            if (!th || tableData.length === 0) return;

            const column = th.dataset.column;

            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }

            sortData(column, currentSort.direction);
            renderTable();
        });

        function sortData(column, direction) {
            tableData.sort((a, b) => {
                const valA = a[column];
                const valB = b[column];
                let comparison = 0;

                if (typeof valA === 'boolean') {
                    comparison = valA === valB ? 0 : valA ? 1 : -1;
                } else if (typeof valA === 'number') {
                    comparison = valA - valB;
                } else {
                    comparison = String(valA).localeCompare(String(valB));
                }

                return direction === 'asc' ? comparison : -comparison;
            });
        }

        // 4. 更新排序指示器
        function updateSortIndicator() {
            const allTh = tableHeader.querySelectorAll('th');
            allTh.forEach(th => {
                th.classList.remove('sorted-asc', 'sorted-desc');
                if (th.dataset.column === currentSort.column) {
                    th.classList.add(currentSort.direction === 'asc' ? 'sorted-asc' : 'sorted-desc');
                }
            });
        }

        // 5. 保存文件
        saveButton.addEventListener('click', () => {
            if (tableData.length === 0) {
                alert('没有数据可以保存！');
                return;
            }

            const jsonString = JSON.stringify(tableData, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);

            const today = new Date();
            const dateString = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            link.download = `sorted_data_${dateString}.json`;

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        });

        // 6. 页面初始加载时，渲染一次表格以显示提示信息和表头
        renderTable();

    </script>

</body>

</html>
