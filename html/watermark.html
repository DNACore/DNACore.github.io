<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片水印工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: #ffffff;
            color: #333;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧面板 */
        .left-panel {
            width: 320px;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        .header {
            padding: 24px 20px;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            color: #666;
        }

        .upload-area {
            margin: 20px;
            border: 2px dashed #d0d0d0;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .upload-area:hover {
            border-color: #999;
            background: #fafafa;
        }

        .upload-area.dragover {
            border-color: #666;
            background: #f0f0f0;
        }

        .upload-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: #333;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        #fileInput {
            display: none;
        }

        .settings-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: white;
            padding: 8px;
            border-radius: 8px;
        }

        .tab {
            flex: 1;
            padding: 8px 12px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            color: #666;
        }

        .tab:hover {
            background: #f0f0f0;
        }

        .tab.active {
            background: #333;
            color: white;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 16px;
            border-radius: 8px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
            font-size: 13px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            font-size: 13px;
            transition: border 0.2s;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="number"]:focus,
        .form-group select:focus {
            outline: none;
            border-color: #666;
        }

        .form-group input[type="color"] {
            width: 50px;
            height: 32px;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            cursor: pointer;
        }

        .form-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .form-group input[type="file"] {
            font-size: 12px;
        }

        .range-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-group input[type="range"] {
            flex: 1;
        }

        .range-value {
            min-width: 45px;
            text-align: center;
            font-weight: 500;
            color: #333;
            font-size: 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 固定底部按钮 */
        .fixed-actions {
            position: sticky;
            bottom: 0;
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #000;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        /* 右侧面板 */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fafafa;
            overflow: hidden;
        }

        /* 大图预览区 */
        .main-preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            position: relative;
            overflow: hidden;
        }

        .main-preview-container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .main-preview-image {
            max-width: 100%;
            max-height: 100%;
            display: block;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 4px;
            user-select: none;
            pointer-events: none;
        }

        /* 水印层 */
        #watermarkLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 可拖动的水印 */
        .draggable-watermark {
            position: absolute;
            cursor: move;
            user-select: none;
            pointer-events: auto;
            transition: border 0.2s;
        }

        .draggable-watermark::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 2px dashed transparent;
            border-radius: 4px;
            pointer-events: none;
        }

        .draggable-watermark:hover::before {
            border-color: rgba(51, 51, 51, 0.5);
        }

        .draggable-watermark.dragging::before {
            border-color: rgba(51, 51, 51, 0.8);
        }

        .draggable-watermark img {
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .watermark-hint {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }

        /* 缩略图预览区 */
        .thumbnail-preview {
            height: 140px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 12px;
            gap: 12px;
        }

        .thumbnail-item {
            flex-shrink: 0;
            width: 110px;
            height: 110px;
            position: relative;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .thumbnail-item:hover {
            border-color: #d0d0d0;
        }

        .thumbnail-item.active {
            border-color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumbnail-item .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s;
        }

        .thumbnail-item:hover .remove-btn {
            opacity: 1;
        }

        .thumbnail-item .remove-btn:hover {
            background: rgba(0,0,0,0.9);
        }

        .empty-state {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* 滚动条样式 */
        .settings-area::-webkit-scrollbar,
        .thumbnail-preview::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .settings-area::-webkit-scrollbar-track,
        .thumbnail-preview::-webkit-scrollbar-track {
            background: transparent;
        }

        .settings-area::-webkit-scrollbar-thumb,
        .thumbnail-preview::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 3px;
        }

        .settings-area::-webkit-scrollbar-thumb:hover,
        .thumbnail-preview::-webkit-scrollbar-thumb:hover {
            background: #b0b0b0;
        }

        @media (max-width: 968px) {
            .container {
                flex-direction: column;
            }

            .left-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                max-height: 50vh;
            }

            .right-panel {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <div class="header">
                <h1>图片水印工具</h1>
                <p>支持批量处理 · 可拖动定位</p>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击或拖放图片</div>
                <div class="upload-hint">支持批量上传 JPG、PNG、GIF</div>
                <input type="file" id="fileInput" accept="image/*" multiple>
            </div>

            <div class="settings-area">
                <div class="tabs">
                    <button class="tab active" data-tab="mask">蒙版水印</button>
                    <button class="tab" data-tab="text">文字水印</button>
                    <button class="tab" data-tab="image">图片水印</button>
                </div>

                <!-- 蒙版水印设置 -->
                <div class="tab-content active" id="mask-content">
                    <div class="form-group">
                        <label>水印文字</label>
                        <input type="text" id="maskText" placeholder="请输入水印文字" value="水印">
                    </div>

                    <div class="form-group">
                        <label>文字大小</label>
                        <div class="range-group">
                            <input type="range" id="maskSize" min="10" max="100" value="30">
                            <span class="range-value" id="maskSizeValue">30px</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>旋转角度</label>
                        <div class="range-group">
                            <input type="range" id="maskRotate" min="-180" max="180" value="-45">
                            <span class="range-value" id="maskRotateValue">-45°</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>水印密度</label>
                        <div class="range-group">
                            <input type="range" id="maskDensity" min="50" max="300" value="150">
                            <span class="range-value" id="maskDensityValue">150</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>文字颜色</label>
                        <input type="color" id="maskColor" value="#000000">
                    </div>

                    <div class="form-group">
                        <label>透明度</label>
                        <div class="range-group">
                            <input type="range" id="maskOpacity" min="0" max="100" value="10">
                            <span class="range-value" id="maskOpacityValue">10%</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>字体</label>
                        <select id="maskFont">
                            <option value="Arial">Arial</option>
                            <option value="Microsoft YaHei">微软雅黑</option>
                            <option value="SimHei">黑体</option>
                            <option value="SimSun">宋体</option>
                            <option value="KaiTi">楷体</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="maskBold">
                            <label for="maskBold" style="margin: 0;">粗体</label>
                        </div>
                    </div>
                </div>

                <!-- 文字水印设置 -->
                <div class="tab-content" id="text-content">
                    <div class="form-group">
                        <label>水印文字</label>
                        <input type="text" id="textContent" placeholder="请输入水印文字" value="水印">
                    </div>

                    <div class="form-group">
                        <label>文字大小</label>
                        <div class="range-group">
                            <input type="range" id="textSize" min="10" max="200" value="48">
                            <span class="range-value" id="textSizeValue">48px</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>文字颜色</label>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>

                    <div class="form-group">
                        <label>透明度</label>
                        <div class="range-group">
                            <input type="range" id="textOpacity" min="0" max="100" value="80">
                            <span class="range-value" id="textOpacityValue">80%</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>字体</label>
                        <select id="textFont">
                            <option value="Arial">Arial</option>
                            <option value="Microsoft YaHei">微软雅黑</option>
                            <option value="SimHei">黑体</option>
                            <option value="SimSun">宋体</option>
                            <option value="KaiTi">楷体</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="textBold">
                            <label for="textBold" style="margin: 0;">粗体</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="color: #666;">💡 可在预览区拖动水印调整位置</label>
                    </div>
                </div>

                <!-- 图片水印设置 -->
                <div class="tab-content" id="image-content">
                    <div class="form-group">
                        <label>选择水印图片</label>
                        <input type="file" id="watermarkImage" accept="image/*">
                    </div>

                    <div class="form-group">
                        <label>图片大小 (%)</label>
                        <div class="range-group">
                            <input type="range" id="imageSize" min="5" max="100" value="20">
                            <span class="range-value" id="imageSizeValue">20%</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>透明度</label>
                        <div class="range-group">
                            <input type="range" id="imageOpacity" min="0" max="100" value="80">
                            <span class="range-value" id="imageOpacityValue">80%</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="color: #666;">💡 可在预览区拖动水印调整位置</label>
                    </div>
                </div>
            </div>

            <!-- 固定底部按钮 -->
            <div class="fixed-actions">
                <button class="btn" id="applyBtn" onclick="applyCurrentWatermark()">应用蒙版水印</button>
                <button class="btn btn-secondary" onclick="downloadAll()">下载全部图片</button>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="right-panel">
            <!-- 大图预览 -->
            <div class="main-preview" id="mainPreview">
                <div class="empty-state">
                    <div class="empty-state-icon">🖼️</div>
                    <div class="empty-state-text">暂无图片，请上传图片</div>
                </div>
            </div>

            <!-- 缩略图预览 -->
            <div class="thumbnail-preview" id="thumbnailPreview">
            </div>
        </div>
    </div>

    <script>
        let uploadedImages = [];
        let processedImages = [];
        let currentImageIndex = 0;
        let currentTab = 'mask';

        // 水印位置信息（像素坐标，相对于图片）
        let watermarkPositions = [];

        // 拖动相关变量
        let isDragging = false;
        let dragElement = null;
        let dragStartX = 0;
        let dragStartY = 0;
        let dragStartLeft = 0;
        let dragStartTop = 0;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initUpload();
            initTabs();
            initRangeInputs();
            initDragEvents();
        });

        // 初始化拖动事件
        function initDragEvents() {
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }

        // 初始化上传功能
        function initUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            uploadArea.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
        }

        // 处理上传的文件
        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            uploadedImages.push({
                                name: file.name,
                                src: e.target.result,
                                img: img
                            });
                            processedImages.push(null);
                            watermarkPositions.push({ x: 0.5, y: 0.5 }); // 默认居中（使用比例）
                            updateThumbnails();
                            if (uploadedImages.length === 1) {
                                showMainPreview(0);
                            }
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // 更新缩略图
        function updateThumbnails() {
            const thumbnailPreview = document.getElementById('thumbnailPreview');

            if (uploadedImages.length === 0) {
                thumbnailPreview.innerHTML = '';
                return;
            }

            thumbnailPreview.innerHTML = uploadedImages.map((item, index) => `
                <div class="thumbnail-item ${index === currentImageIndex ? 'active' : ''}" onclick="showMainPreview(${index})">
                    <img src="${processedImages[index] || item.src}" alt="${item.name}">
                    <button class="remove-btn" onclick="removeImage(event, ${index})">×</button>
                </div>
            `).join('');
        }

        // 显示大图预览
        function showMainPreview(index) {
            currentImageIndex = index;
            const mainPreview = document.getElementById('mainPreview');
            const item = uploadedImages[index];

            mainPreview.innerHTML = `
                <div class="main-preview-container">
                    <img src="${processedImages[index] || item.src}"
                         class="main-preview-image"
                         id="mainPreviewImage">
                    <div id="watermarkLayer"></div>
                </div>
            `;

            // 如果是文字或图片水印模式，显示可拖动的水印预览
            if (currentTab === 'text' || currentTab === 'image') {
                setTimeout(() => showDraggableWatermark(), 100);
            }

            updateThumbnails();
        }

        // 显示可拖动的水印
        function showDraggableWatermark() {
            const previewImage = document.getElementById('mainPreviewImage');
            const watermarkLayer = document.getElementById('watermarkLayer');

            if (!previewImage || !watermarkLayer) return;

            watermarkLayer.innerHTML = '';

            // 等待图片加载完成
            if (!previewImage.complete) {
                previewImage.onload = () => showDraggableWatermark();
                return;
            }

            const imgRect = previewImage.getBoundingClientRect();
            const position = watermarkPositions[currentImageIndex] || { x: 0.5, y: 0.5 };

            if (currentTab === 'text') {
                const text = document.getElementById('textContent').value;
                const size = document.getElementById('textSize').value;
                const color = document.getElementById('textColor').value;
                const opacity = document.getElementById('textOpacity').value / 100;
                const font = document.getElementById('textFont').value;
                const bold = document.getElementById('textBold').checked;

                const watermark = document.createElement('div');
                watermark.className = 'draggable-watermark';
                watermark.style.cssText = `
                    font-size: ${size}px;
                    color: ${color};
                    opacity: ${opacity};
                    font-family: ${font};
                    font-weight: ${bold ? 'bold' : 'normal'};
                    white-space: nowrap;
                `;
                watermark.textContent = text;
                watermarkLayer.appendChild(watermark);

                // 设置初始位置（需要先添加到DOM才能获取宽高）
                setTimeout(() => {
                    const rect = watermark.getBoundingClientRect();
                    watermark.style.left = (position.x * imgRect.width - rect.width / 2) + 'px';
                    watermark.style.top = (position.y * imgRect.height - rect.height / 2) + 'px';
                }, 0);

                setupDraggable(watermark);

            } else if (currentTab === 'image') {
                const watermarkInput = document.getElementById('watermarkImage');
                if (!watermarkInput.files || !watermarkInput.files[0]) return;

                const size = document.getElementById('imageSize').value / 100;
                const opacity = document.getElementById('imageOpacity').value / 100;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const watermark = document.createElement('div');
                    watermark.className = 'draggable-watermark';
                    watermark.style.opacity = opacity;

                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.width = (imgRect.width * size) + 'px';
                    img.style.height = 'auto';

                    watermark.appendChild(img);
                    watermarkLayer.appendChild(watermark);

                    // 设置初始位置
                    img.onload = () => {
                        const rect = watermark.getBoundingClientRect();
                        watermark.style.left = (position.x * imgRect.width - rect.width / 2) + 'px';
                        watermark.style.top = (position.y * imgRect.height - rect.height / 2) + 'px';
                    };

                    setupDraggable(watermark);
                };
                reader.readAsDataURL(watermarkInput.files[0]);
            }

            // 显示提示
            const hint = document.createElement('div');
            hint.className = 'watermark-hint';
            hint.textContent = '拖动水印调整位置';
            watermarkLayer.appendChild(hint);
            setTimeout(() => hint.remove(), 2000);
        }

        // 设置元素可拖动
        function setupDraggable(element) {
            element.addEventListener('mousedown', function(e) {
                e.preventDefault();
                e.stopPropagation();

                isDragging = true;
                dragElement = element;
                element.classList.add('dragging');

                dragStartX = e.clientX;
                dragStartY = e.clientY;

                // 获取当前位置
                const currentLeft = parseFloat(element.style.left) || 0;
                const currentTop = parseFloat(element.style.top) || 0;

                dragStartLeft = currentLeft;
                dragStartTop = currentTop;
            });
        }

        // 处理鼠标移动
        function handleMouseMove(e) {
            if (!isDragging || !dragElement) return;

            e.preventDefault();

            const deltaX = e.clientX - dragStartX;
            const deltaY = e.clientY - dragStartY;

            const newLeft = dragStartLeft + deltaX;
            const newTop = dragStartTop + deltaY;

            dragElement.style.left = newLeft + 'px';
            dragElement.style.top = newTop + 'px';
        }

        // 处理鼠标释放
        function handleMouseUp(e) {
            if (!isDragging || !dragElement) return;

            dragElement.classList.remove('dragging');

            // 保存位置（转换为相对于图片的比例）
            const previewImage = document.getElementById('mainPreviewImage');
            if (previewImage) {
                const imgRect = previewImage.getBoundingClientRect();
                const elemRect = dragElement.getBoundingClientRect();

                // 计算水印中心点相对于图片的比例
                const centerX = elemRect.left + elemRect.width / 2 - imgRect.left;
                const centerY = elemRect.top + elemRect.height / 2 - imgRect.top;

                watermarkPositions[currentImageIndex] = {
                    x: Math.max(0, Math.min(1, centerX / imgRect.width)),
                    y: Math.max(0, Math.min(1, centerY / imgRect.height))
                };
            }

            isDragging = false;
            dragElement = null;
        }

        // 移除图片
        function removeImage(event, index) {
            event.stopPropagation();
            uploadedImages.splice(index, 1);
            processedImages.splice(index, 1);
            watermarkPositions.splice(index, 1);

            if (uploadedImages.length === 0) {
                const mainPreview = document.getElementById('mainPreview');
                mainPreview.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🖼️</div>
                        <div class="empty-state-text">暂无图片，请上传图片</div>
                    </div>
                `;
                currentImageIndex = 0;
            } else {
                if (currentImageIndex >= uploadedImages.length) {
                    currentImageIndex = uploadedImages.length - 1;
                }
                showMainPreview(currentImageIndex);
            }
            updateThumbnails();
        }

        // 初始化标签页
        function initTabs() {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.dataset.tab;
                    currentTab = tabName;

                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                    tab.classList.add('active');
                    document.getElementById(`${tabName}-content`).classList.add('active');

                    // 更新应用按钮文字
                    const applyBtn = document.getElementById('applyBtn');
                    const btnText = {
                        'mask': '应用蒙版水印',
                        'text': '应用文字水印',
                        'image': '应用图片水印'
                    };
                    applyBtn.textContent = btnText[tabName];

                    // 如果有图片，更新预览
                    if (uploadedImages.length > 0) {
                        showMainPreview(currentImageIndex);
                    }
                });
            });
        }

        // 初始化范围输入
        function initRangeInputs() {
            const ranges = [
                { id: 'maskSize', valueId: 'maskSizeValue', suffix: 'px' },
                { id: 'maskRotate', valueId: 'maskRotateValue', suffix: '°' },
                { id: 'maskDensity', valueId: 'maskDensityValue', suffix: '' },
                { id: 'maskOpacity', valueId: 'maskOpacityValue', suffix: '%' },
                { id: 'textSize', valueId: 'textSizeValue', suffix: 'px', callback: () => currentTab === 'text' && uploadedImages.length > 0 && showDraggableWatermark() },
                { id: 'textOpacity', valueId: 'textOpacityValue', suffix: '%', callback: () => currentTab === 'text' && uploadedImages.length > 0 && showDraggableWatermark() },
                { id: 'imageSize', valueId: 'imageSizeValue', suffix: '%', callback: () => currentTab === 'image' && uploadedImages.length > 0 && showDraggableWatermark() },
                { id: 'imageOpacity', valueId: 'imageOpacityValue', suffix: '%', callback: () => currentTab === 'image' && uploadedImages.length > 0 && showDraggableWatermark() }
            ];

            ranges.forEach(range => {
                const input = document.getElementById(range.id);
                const valueDisplay = document.getElementById(range.valueId);

                input.addEventListener('input', () => {
                    valueDisplay.textContent = input.value + range.suffix;
                    if (range.callback) range.callback();
                });
            });

            // 文字和颜色变化时也更新预览
            ['textContent', 'textColor', 'textFont', 'textBold'].forEach(id => {
                const element = document.getElementById(id);
                element.addEventListener(element.type === 'checkbox' ? 'change' : 'input', () => {
                    if (currentTab === 'text' && uploadedImages.length > 0) {
                        showDraggableWatermark();
                    }
                });
            });

            // 水印图片变化时更新预览
            document.getElementById('watermarkImage').addEventListener('change', () => {
                if (currentTab === 'image' && uploadedImages.length > 0) {
                    showDraggableWatermark();
                }
            });
        }

        // 应用当前水印
        function applyCurrentWatermark() {
            if (uploadedImages.length === 0) {
                alert('请先上传图片！');
                return;
            }

            if (currentTab === 'mask') {
                applyMaskWatermark();
            } else if (currentTab === 'text') {
                applyTextWatermark();
            } else if (currentTab === 'image') {
                applyImageWatermark();
            }
        }

        // 应用蒙版水印
        function applyMaskWatermark() {
            const text = document.getElementById('maskText').value;
            const size = document.getElementById('maskSize').value;
            const rotate = document.getElementById('maskRotate').value;
            const density = document.getElementById('maskDensity').value;
            const color = document.getElementById('maskColor').value;
            const opacity = document.getElementById('maskOpacity').value / 100;
            const font = document.getElementById('maskFont').value;
            const bold = document.getElementById('maskBold').checked;

            uploadedImages.forEach((item, index) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                canvas.width = item.img.width;
                canvas.height = item.img.height;

                ctx.drawImage(item.img, 0, 0);

                ctx.font = `${bold ? 'bold' : 'normal'} ${size}px ${font}`;
                ctx.fillStyle = color;
                ctx.globalAlpha = opacity;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.save();

                const spacing = parseInt(density);
                for (let y = -canvas.height; y < canvas.height * 2; y += spacing) {
                    for (let x = -canvas.width; x < canvas.width * 2; x += spacing) {
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(rotate * Math.PI / 180);
                        ctx.fillText(text, 0, 0);
                        ctx.restore();
                    }
                }

                ctx.restore();

                processedImages[index] = canvas.toDataURL();
            });

            showMainPreview(currentImageIndex);
            updateThumbnails();
        }

        // 应用文字水印
        function applyTextWatermark() {
            const text = document.getElementById('textContent').value;
            const size = document.getElementById('textSize').value;
            const color = document.getElementById('textColor').value;
            const opacity = document.getElementById('textOpacity').value / 100;
            const font = document.getElementById('textFont').value;
            const bold = document.getElementById('textBold').checked;

            uploadedImages.forEach((item, index) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                canvas.width = item.img.width;
                canvas.height = item.img.height;

                ctx.drawImage(item.img, 0, 0);

                ctx.font = `${bold ? 'bold' : 'normal'} ${size}px ${font}`;
                ctx.fillStyle = color;
                ctx.globalAlpha = opacity;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const position = watermarkPositions[index] || { x: 0.5, y: 0.5 };
                const x = canvas.width * position.x;
                const y = canvas.height * position.y;

                ctx.fillText(text, x, y);

                processedImages[index] = canvas.toDataURL();
            });

            showMainPreview(currentImageIndex);
            updateThumbnails();
        }

        // 应用图片水印
        function applyImageWatermark() {
            const watermarkInput = document.getElementById('watermarkImage');
            if (!watermarkInput.files || !watermarkInput.files[0]) {
                alert('请先选择水印图片！');
                return;
            }

            const size = document.getElementById('imageSize').value / 100;
            const opacity = document.getElementById('imageOpacity').value / 100;

            const reader = new FileReader();
            reader.onload = (e) => {
                const watermarkImg = new Image();
                watermarkImg.onload = () => {
                    uploadedImages.forEach((item, index) => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        canvas.width = item.img.width;
                        canvas.height = item.img.height;

                        ctx.drawImage(item.img, 0, 0);

                        const watermarkWidth = canvas.width * size;
                        const watermarkHeight = watermarkImg.height * (watermarkWidth / watermarkImg.width);

                        const position = watermarkPositions[index] || { x: 0.5, y: 0.5 };
                        const x = canvas.width * position.x - watermarkWidth / 2;
                        const y = canvas.height * position.y - watermarkHeight / 2;

                        ctx.globalAlpha = opacity;
                        ctx.drawImage(watermarkImg, x, y, watermarkWidth, watermarkHeight);

                        processedImages[index] = canvas.toDataURL();
                    });

                    showMainPreview(currentImageIndex);
                    updateThumbnails();
                };
                watermarkImg.src = e.target.result;
            };
            reader.readAsDataURL(watermarkInput.files[0]);
        }

        // 下载所有图片
        function downloadAll() {
            if (processedImages.filter(img => img !== null).length === 0) {
                alert('请先应用水印！');
                return;
            }

            processedImages.forEach((imgData, index) => {
                if (imgData) {
                    const link = document.createElement('a');
                    const originalName = uploadedImages[index].name;
                    const nameParts = originalName.split('.');
                    const ext = nameParts.pop();
                    const baseName = nameParts.join('.');

                    link.download = `${baseName}_watermarked.${ext}`;
                    link.href = imgData;
                    link.click();
                }
            });
        }
    </script>
</body>
</html>
